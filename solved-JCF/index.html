<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverse String</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        padding: 40px;
        background-color: #ffffff;
        color: #1a1a1a;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 24px;
        color: #1a1a1a;
      }

      .input-field {
        width: 100%;
        padding: 16px;
        font-size: 1.125rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.2s;
      }

      .input-field:focus {
        border-color: #3b82f6;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        font-size: 1rem;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .btn-primary {
        background-color: #3b82f6;
        color: #ffffff;
        margin-top: 16px;
      }

      .btn-secondary {
        background-color: #6b7280;
        color: #ffffff;
        margin-top: 12px;
      }

      .btn.hidden {
        display: none;
      }

      .result {
        margin-top: 24px;
        font-size: 1.25rem;
        color: #374151;
        word-break: break-all;
      }

      .result.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Reverse String</h1>

      <input
        type="text"
        id="inputText"
        class="input-field"
        placeholder="Enter text here..."
      />

      <button id="reverseBtn" class="btn btn-primary hidden">
        Reverse
        <span>&#128259;</span>
      </button>

      <p id="result" class="result hidden"></p>

      <button id="copyBtn" class="btn btn-secondary hidden">
        Copy
        <span>&#128203;</span>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
